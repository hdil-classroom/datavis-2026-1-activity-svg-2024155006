<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 600px;
			height: 500px;
		}

		/* YOUR CSS CODE WILL GO HERE */
		text {
            font-family: sans-serif;
            fill: black;
        }

        .axis-label {
            font-size: 15px;
            font-weight: bold;
        }

        .tick-label {
            font-size: 9px;
        }

        .station-name {
            font-size: 9px;
            text-anchor: middle;
        }

        .line1 { fill: blue; }
        .line2 { fill: green; }
        .line3 { fill: orange; }

        .axis-line {
            stroke: gray;
            stroke-width: 1;
        }

	</style>
</head>

<body>
	<h1 id="header-title">
		In-Class Acitivity by 박선빈
	</h1>

	<svg id="visualization-activity">
		<!-- YOUR SVG CODE WILL GO HERE -->
		<line x1="65" y1="50" x2="65" y2="420" class="axis-line" /> <line x1="65" y1="420" x2="520" y2="420" class="axis-line" /> <g class="y-ticks">
            <text x="60" y="424" class="tick-label" text-anchor="end">0</text>
            <text x="60" y="379" class="tick-label" text-anchor="end">10,000</text>
            <text x="60" y="333" class="tick-label" text-anchor="end">20,000</text>
            <text x="60" y="288" class="tick-label" text-anchor="end">30,000</text>
            <text x="60" y="242" class="tick-label" text-anchor="end">40,000</text>
            <text x="60" y="197" class="tick-label" text-anchor="end">50,000</text>
            <text x="60" y="151" class="tick-label" text-anchor="end">60,000</text>
            <text x="60" y="106" class="tick-label" text-anchor="end">70,000</text>
            <text x="60" y="60" class="tick-label" text-anchor="end">80,000</text>
        </g>

        <text x="-235" y="15" class="axis-label" transform="rotate(-90)">Entry Count</text>
        <text x="290" y="475" class="axis-label" text-anchor="middle">Station Name</text>

        <rect x="80" y="85" width="40" height="335" class="line2" />
        <text x="100" y="435" class="station-name">홍대입구</text>

        <rect x="145" y="130" width="40" height="290" class="line2" />
        <text x="165" y="435" class="station-name">잠실(송파구청)</text>

        <rect x="210" y="174" width="40" height="246" class="line3" />
        <text x="230" y="435" class="station-name">고속터미널</text>

        <rect x="275" y="233" width="40" height="187" class="line1" />
        <text x="295" y="435" class="station-name">서울역</text>

        <rect x="340" y="244" width="40" height="176" class="line2" />
        <text x="360" y="435" class="station-name">신림</text>

        <rect x="405" y="247" width="40" height="173" class="line2" />
        <text x="425" y="435" class="station-name">신도림</text>

        <g transform="translate(530, 80)">
            <rect width="12" height="12" class="line1" />
            <text x="16" y="10" class="tick-label">Line 1</text>
            
            <rect y="20" width="12" height="12" class="line2" />
            <text x="16" y="30" class="tick-label">Line 2</text>
            
            <rect y="40" width="12" height="12" class="line3" />
            <text x="16" y="50" class="tick-label">Line 3</text>
        </g>
	</svg>

</body>
</html>
